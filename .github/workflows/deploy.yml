name: Deploy Mars

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        type: choice
        options:
          - all
          - web
          - server
        default: all

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Configure git to use SSH (HTTPS blocked by firewall)
        run: |
          git config --global url."git@github.com:".insteadOf "https://github.com/"

      - uses: actions/checkout@v4

      - name: Build & Deploy
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TARGET="all"
          else
            TARGET="${{ inputs.target }}"
          fi

          echo "=== Deploy target: $TARGET ==="

          COMPOSE_FILES="-f docker-compose.yml -f docker-compose.prod.yml"

          echo "=== Removing old containers ==="
          docker rm -f mars-web mars-server 2>/dev/null || true

          case "$TARGET" in
            all)
              docker compose $COMPOSE_FILES build web server
              docker compose $COMPOSE_FILES up -d web server
              ;;
            web)
              docker compose $COMPOSE_FILES build web
              docker compose $COMPOSE_FILES up -d web
              ;;
            server)
              docker compose $COMPOSE_FILES build server
              docker compose $COMPOSE_FILES up -d server
              ;;
          esac

      - name: Health Check
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TARGET="all"
          else
            TARGET="${{ inputs.target }}"
          fi
          echo "=== Health check for target: $TARGET ==="

          check_url() {
            local name=$1 url=$2
            echo "--- Checking $name ($url) ---"
            for i in $(seq 1 12); do
              if curl -sf "$url" > /dev/null 2>&1; then
                echo "$name OK"
                return 0
              fi
              echo "Attempt $i/12: $name not ready yet..."
              sleep 5
            done
            echo "FAILED: $name did not respond in time"
            return 1
          }

          case "$TARGET" in
            all|web)
              check_url "Web" "http://localhost:3000/" || exit 1
              ;;
          esac

          case "$TARGET" in
            all|server)
              check_url "Server API" "http://localhost:4000/api/auth/url" || exit 1
              ;;
          esac

          echo "=== All health checks passed ==="

      - name: Cleanup
        run: |
          docker image prune -f
          echo "=== Deploy complete ==="
