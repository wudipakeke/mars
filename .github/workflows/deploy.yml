name: Deploy Mars

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        type: choice
        options:
          - all
          - web
          - server
        default: all

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Configure git to use SSH (HTTPS blocked by firewall)
        run: |
          git config --global url."git@github.com:".insteadOf "https://github.com/"

      - uses: actions/checkout@v4

      - name: Build & Deploy
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TARGET="all"
          else
            TARGET="${{ inputs.target }}"
          fi

          echo "=== Deploy target: $TARGET ==="

          COMPOSE_FILES="-f docker-compose.yml -f docker-compose.prod.yml"

          case "$TARGET" in
            all)
              docker compose $COMPOSE_FILES build web server
              docker compose $COMPOSE_FILES up -d web server
              ;;
            web)
              docker compose $COMPOSE_FILES build web
              docker compose $COMPOSE_FILES up -d web
              ;;
            server)
              docker compose $COMPOSE_FILES build server
              docker compose $COMPOSE_FILES up -d server
              ;;
          esac

          docker image prune -f
          echo "=== Deploy complete ==="
