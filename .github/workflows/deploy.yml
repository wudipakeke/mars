name: CD - Mars Version Based Release

on:
  push:
    branches:
      - main
    paths:
      - 'apps/server/package.json'
      - 'apps/web/package.json'
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        type: choice
        options:
          - all
          - web
          - server
        default: all

env:
  NAMESPACE: mars-system
  CLUSTER_NAME: mars-cluster

jobs:
  # ─── Job 1: 检测版本变更 ───
  detect-version-changes:
    runs-on: self-hosted
    outputs:
      server-changed: ${{ steps.check.outputs.server-changed }}
      server-version: ${{ steps.check.outputs.server-version }}
      web-changed: ${{ steps.check.outputs.web-changed }}
      web-version: ${{ steps.check.outputs.web-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configure git to use SSH (HTTPS blocked by firewall)
        run: |
          git config --global url."git@github.com:".insteadOf "https://github.com/"

      - name: Check version changes
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # 手动触发：根据 target 输入决定
            SERVER_VER=$(cat apps/server/package.json | jq -r '.version')
            WEB_VER=$(cat apps/web/package.json | jq -r '.version')
            echo "server-version=$SERVER_VER" >> $GITHUB_OUTPUT
            echo "web-version=$WEB_VER" >> $GITHUB_OUTPUT

            TARGET=${{ inputs.target }}
            if [ "$TARGET" = "all" ] || [ "$TARGET" = "server" ]; then
              echo "server-changed=true" >> $GITHUB_OUTPUT
            else
              echo "server-changed=false" >> $GITHUB_OUTPUT
            fi
            if [ "$TARGET" = "all" ] || [ "$TARGET" = "web" ]; then
              echo "web-changed=true" >> $GITHUB_OUTPUT
            else
              echo "web-changed=false" >> $GITHUB_OUTPUT
            fi
          else
            # Push 触发：对比版本号
            SERVER_CUR=$(cat apps/server/package.json | jq -r '.version')
            WEB_CUR=$(cat apps/web/package.json | jq -r '.version')
            echo "Current server: $SERVER_CUR, web: $WEB_CUR"

            git checkout HEAD~1 --quiet 2>/dev/null || true
            SERVER_PREV=$(cat apps/server/package.json 2>/dev/null | jq -r '.version' || echo "0.0.0")
            WEB_PREV=$(cat apps/web/package.json 2>/dev/null | jq -r '.version' || echo "0.0.0")
            git checkout - --quiet 2>/dev/null || true
            echo "Previous server: $SERVER_PREV, web: $WEB_PREV"

            if [ "$SERVER_CUR" != "$SERVER_PREV" ]; then
              echo "server-changed=true" >> $GITHUB_OUTPUT
              echo "📦 Server version changed: $SERVER_PREV -> $SERVER_CUR"
            else
              echo "server-changed=false" >> $GITHUB_OUTPUT
              echo "ℹ️ Server version unchanged: $SERVER_CUR"
            fi
            if [ "$WEB_CUR" != "$WEB_PREV" ]; then
              echo "web-changed=true" >> $GITHUB_OUTPUT
              echo "📦 Web version changed: $WEB_PREV -> $WEB_CUR"
            else
              echo "web-changed=false" >> $GITHUB_OUTPUT
              echo "ℹ️ Web version unchanged: $WEB_CUR"
            fi

            echo "server-version=$SERVER_CUR" >> $GITHUB_OUTPUT
            echo "web-version=$WEB_CUR" >> $GITHUB_OUTPUT
          fi

  # ─── Job 2: 发版后端 ───
  release-server:
    needs: detect-version-changes
    if: |
      needs.detect-version-changes.outputs.server-changed == 'true' ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'server'))
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Configure git to use SSH
        run: |
          git config --global url."git@github.com:".insteadOf "https://github.com/"

      - name: Build Mars Server image
        run: |
          VERSION=${{ needs.detect-version-changes.outputs.server-version }}
          docker build -f docker/Dockerfile.server -t mars-server:${VERSION} -t mars-server:latest .

      - name: Import image to k3d
        run: |
          VERSION=${{ needs.detect-version-changes.outputs.server-version }}
          k3d image import mars-server:${VERSION} mars-server:latest -c ${{ env.CLUSTER_NAME }}

      - name: Rollout restart
        run: |
          kubectl rollout restart deployment/mars-server -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/mars-server -n ${{ env.NAMESPACE }} --timeout=120s

      - name: Health check
        run: |
          echo "=== Health check: Mars Server ==="
          for i in $(seq 1 12); do
            if curl -sf http://localhost:9261/api/business > /dev/null 2>&1; then
              echo "Mars Server OK"
              exit 0
            fi
            echo "Attempt $i/12: not ready yet..."
            sleep 5
          done
          echo "FAILED: Mars Server did not respond"
          exit 1

  # ─── Job 3: 发版前端 ───
  release-web:
    needs: detect-version-changes
    if: |
      needs.detect-version-changes.outputs.web-changed == 'true' ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'web'))
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Configure git to use SSH
        run: |
          git config --global url."git@github.com:".insteadOf "https://github.com/"

      - name: Build Mars Web image
        run: |
          VERSION=${{ needs.detect-version-changes.outputs.web-version }}
          docker build -f docker/Dockerfile.web -t mars-web:${VERSION} -t mars-web:latest .

      - name: Import image to k3d
        run: |
          VERSION=${{ needs.detect-version-changes.outputs.web-version }}
          k3d image import mars-web:${VERSION} mars-web:latest -c ${{ env.CLUSTER_NAME }}

      - name: Rollout restart
        run: |
          kubectl rollout restart deployment/mars-web -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/mars-web -n ${{ env.NAMESPACE }} --timeout=120s

      - name: Health check
        run: |
          echo "=== Health check: Mars Web ==="
          for i in $(seq 1 12); do
            if curl -sf http://localhost:9262/ > /dev/null 2>&1; then
              echo "Mars Web OK"
              exit 0
            fi
            echo "Attempt $i/12: not ready yet..."
            sleep 5
          done
          echo "FAILED: Mars Web did not respond"
          exit 1

  # ─── Job 4: 发布总结 + 飞书通知 ───
  release-summary:
    needs: [detect-version-changes, release-server, release-web]
    if: always()
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Determine deploy result
        id: result
        run: |
          SERVER_RESULT="${{ needs.release-server.result }}"
          WEB_RESULT="${{ needs.release-web.result }}"

          echo "Server result: $SERVER_RESULT"
          echo "Web result: $WEB_RESULT"

          NEED_SERVER="${{ needs.detect-version-changes.outputs.server-changed }}"
          NEED_WEB="${{ needs.detect-version-changes.outputs.web-changed }}"

          # 构建部署描述
          TARGETS=""
          if [ "$NEED_SERVER" = "true" ] || [ "${{ inputs.target }}" = "server" ] || [ "${{ inputs.target }}" = "all" ]; then
            TARGETS="${TARGETS}server "
          fi
          if [ "$NEED_WEB" = "true" ] || [ "${{ inputs.target }}" = "web" ] || [ "${{ inputs.target }}" = "all" ]; then
            TARGETS="${TARGETS}web "
          fi
          if [ -z "$TARGETS" ] && [ "${{ github.event_name }}" = "push" ]; then
            TARGETS="(no changes detected)"
          elif [ -z "$TARGETS" ]; then
            TARGETS="manual: ${{ inputs.target }}"
          fi

          echo "targets=$TARGETS" >> $GITHUB_OUTPUT

          COMMIT=$(git log --oneline -1 | cut -d' ' -f1)
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT

          OVERALL="success"
          if [ "$SERVER_RESULT" = "failure" ] || [ "$SERVER_RESULT" = "cancelled" ] || \
             [ "$WEB_RESULT" = "failure" ] || [ "$WEB_RESULT" = "cancelled" ]; then
            OVERALL="failure"
          fi
          echo "overall=$OVERALL" >> $GITHUB_OUTPUT
          echo "Commit: $COMMIT, Targets: $TARGETS, Result: $OVERALL"

          # GITHUB_STEP_SUMMARY
          echo "## 📋 Mars Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$NEED_SERVER" = "true" ]; then
            S_VER="${{ needs.detect-version-changes.outputs.server-version }}"
            if [ "$SERVER_RESULT" = "success" ]; then
              echo "✅ **@mars/server** v${S_VER} - Released" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **@mars/server** v${S_VER} - Failed" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          if [ "$NEED_WEB" = "true" ]; then
            W_VER="${{ needs.detect-version-changes.outputs.web-version }}"
            if [ "$WEB_RESULT" = "success" ]; then
              echo "✅ **@mars/web** v${W_VER} - Released" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **@mars/web** v${W_VER} - Failed" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Send Feishu notification
        if: needs.release-server.result != 'skipped' || needs.release-web.result != 'skipped'
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
        run: |
          [ -z "$FEISHU_WEBHOOK_URL" ] && echo "FEISHU_WEBHOOK_URL 未配置，跳过通知" && exit 0

          RESULT="${{ steps.result.outputs.overall }}"
          TARGETS="${{ steps.result.outputs.targets }}"
          COMMIT="${{ steps.result.outputs.commit }}"
          SR="${{ needs.release-server.result }}"
          WR="${{ needs.release-web.result }}"

          if [ "$RESULT" = "success" ]; then
            COLOR="green"; STATUS_TEXT="全部成功"
          else
            COLOR="red"; STATUS_TEXT="有任务失败"
          fi

          [ "$SR" = "success" ] && S_ICON="✅" || S_ICON="❌"
          [ "$WR" = "success" ] && W_ICON="✅" || W_ICON="❌"
          [ -z "$SR" ] || [ "$SR" = "skipped" ] && S_LINE="后端: - (未变更)" || S_LINE="后端: ${S_ICON}"
          [ -z "$WR" ] || [ "$WR" = "skipped" ] && W_LINE="前端: - (未变更)" || W_LINE="前端: ${W_ICON}"
          DETAIL="${S_LINE}\n${W_LINE}"

          TIMESTAMP=$(date +%s)
          KEY=$(printf '%s\n%s' "${TIMESTAMP}" "${FEISHU_WEBHOOK_SECRET}")
          SIGN=$(openssl dgst -sha256 -hmac "${KEY}" -binary < /dev/null | base64 -w 0)

          jq -n \
            --arg timestamp "$TIMESTAMP" \
            --arg sign "$SIGN" \
            --arg color "$COLOR" \
            --arg commit "$COMMIT" \
            --arg targets "$TARGETS" \
            --arg status "$STATUS_TEXT" \
            --arg detail "$DETAIL" \
            '{
              timestamp: $timestamp,
              sign: $sign,
              msg_type: "interactive",
              card: {
                config: { wide_screen_mode: true },
                header: { title: { tag: "plain_text", content: "🚀 Mars 部署通知" }, template: $color },
                elements: [
                  { tag: "div", text: { tag: "lark_md", content: ("**提交**: " + $commit + "\n**目标**: " + $targets + "\n**结果**: " + $status + "\n---\n" + $detail) } }
                ]
              }
            }' | curl -s -X POST -H "Content-Type: application/json" -d @- "$FEISHU_WEBHOOK_URL"
