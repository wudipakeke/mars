services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: mars-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: mars-server
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: mysql://root:root123@mysql:3306/mars
      FEISHU_APP_ID: cli_a976e72a8a3cdbd0
      FEISHU_APP_SECRET: Hg6F2UbXaSyumDNrQOiQ3gTBJiMbx2my
      FEISHU_REDIRECT_URI: http://localhost:3000/auth
      JWT_SECRET: mars-jwt-secret-change-in-production
    depends_on:
      mysql:
        condition: service_healthy
